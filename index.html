<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rishikesh Bastakoti Personal Agent</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-top">
          <button id="newChatBtn" class="btn secondary full">+ New chat</button>
          <button id="toggleSidebarBtn" class="icon-btn" title="Toggle sidebar">
            ☰
          </button>
        </div>

        <div class="history-section">
          <p class="section-title">Recents</p>
          <ul id="historyList" class="history-list"></ul>
        </div>

        <div class="sidebar-footer">
          <button id="signInBtn" class="btn primary full">Sign in</button>
          <div id="userPanel" class="user-panel hidden">
            <p id="userName" class="user-name"></p>
            <button id="signOutBtn" class="btn ghost full">Sign out</button>
          </div>
        </div>
      </aside>

      <main class="chat-shell">
        <header class="topbar">
          <div class="topbar-left">
            <button id="mobileSidebarBtn" class="icon-btn">☰</button>
            <h1>Rishikesh Bastakoti Personal Agent</h1>
          </div>
          <div class="topbar-right">
            <span id="statusPill" class="status ready">Ready</span>
          </div>
        </header>

        <section class="chat-panel">
          <div class="chat-meta">
            <div class="field compact">
              <label for="providerSelect">Provider</label>
              <select id="providerSelect"></select>
            </div>
            <div class="field compact">
              <label for="modelSelect">Model</label>
              <select id="modelSelect"></select>
            </div>
            <div class="field compact grow">
              <label for="systemPrompt">System prompt</label>
              <input id="systemPrompt" type="text" placeholder="You are a helpful assistant..." />
            </div>
            <div class="field compact">
              <label for="temperature">Temp <span id="tempValue">0.7</span></label>
              <input id="temperature" type="range" min="0" max="1" step="0.1" value="0.7" />
            </div>
          </div>

          <section id="chatMessages" class="messages"></section>

          <form id="chatForm" class="chat-input">
            <textarea id="messageInput" rows="2" placeholder="Ask anything" required></textarea>
            <button type="submit" class="btn primary">Send</button>
          </form>
        </section>
      </main>
    </div>

    <div id="authModal" class="modal hidden" role="dialog" aria-modal="true">
      <div class="modal-card">
        <h2>Sign in</h2>
        <p class="muted">Frontend demo auth. No backend yet.</p>
        <form id="signInForm" class="auth-form">
          <label for="nameInput">Name</label>
          <input id="nameInput" type="text" required placeholder="Your name" />
          <label for="emailInput">Email</label>
          <input id="emailInput" type="email" required placeholder="you@example.com" />
          <div class="modal-actions">
            <button type="button" id="cancelSignInBtn" class="btn ghost">Cancel</button>
            <button type="submit" class="btn primary">Continue</button>
          </div>
        </form>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
